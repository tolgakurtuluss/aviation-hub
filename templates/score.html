{% extends "base.html" %}

{% block title %}Quiz Over - Your Score{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2 text-center">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Game Over!</h3>
                </div>
                <div class="card-body">
                    <h4 class="card-title">Your Final Score is:</h4>
                    <p class="display-1">{{ score }} / 10</p>
                    <a href="{{ url_for('game_start') }}" class="btn btn-primary btn-lg mt-3">Play Again</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
