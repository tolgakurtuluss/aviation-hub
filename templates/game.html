{% extends "base.html" %}

{% block title %}Aviation Quiz{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Question {{ question_number }}/10</h3>
                </div>
                <div class="card-body">
                    <p class="lead">{{ question }}</p>
                    <form method="post" action="{{ url_for('game_question', question_id=question_id) }}">
                        <div class="d-grid gap-2">
                            {% for option in options %}
                                <button type="submit" name="option" value="{{ option }}" class="btn btn-outline-primary btn-lg mb-2">{{ option }}</button>
                            {% endfor %}
                        </div>
                    </form>
                </div>
                <div class="card-footer text-muted">
                    Score: {{ score }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
